name: Build Custom Docker Image

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Image tag version (e.g. 0.90.3)"
        required: true
        default: "latest"

env:
  REGISTRY_URL: ${{ secrets.REGISTRY_URL || 'docker.io' }}
  IMAGE_NAME: ${{ secrets.IMAGE_NAME || 'yangsongyao/trilium' }}

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Determine version tag
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="${{ github.event.inputs.version }}"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Building image tag: ${TAG}"

      - name: Checkout repository
        uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Update build info
        run: pnpm run chore:update-build-info

      - name: Run the TypeScript build
        run: pnpm run server:build

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v7
        with:
          context: apps/server
          file: apps/server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY_URL }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}
            ${{ env.REGISTRY_URL }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image
        run: |
          echo "Image pushed successfully!"
          echo "  ${{ env.REGISTRY_URL }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}"
          echo "  ${{ env.REGISTRY_URL }}/${{ env.IMAGE_NAME }}:latest"